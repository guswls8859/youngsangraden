{% extends 'base.html' %}
{% block title %}로그인 - 용산어린이정원 업무보고{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-4">
        <div class="card shadow-sm mt-4 mt-md-5">
            <div class="card-body p-4">
                <h4 class="card-title text-center mb-4">
                    <i class="bi bi-clipboard2-check text-primary"></i><br>
                    용산어린이정원 업무보고
                </h4>
                <form method="post">
                    {% csrf_token %}
                    <div class="mb-3">
                        <label class="form-label">{{ form.username.label }}</label>
                        {{ form.username }}
                    </div>
                    <div class="mb-3">
                        <label class="form-label">{{ form.password.label }}</label>
                        {{ form.password }}
                    </div>
                    {% if form.errors %}
                    <div class="alert alert-danger small">아이디 또는 비밀번호가 올바르지 않습니다.</div>
                    {% endif %}
                    <button type="submit" class="btn btn-primary w-100">로그인</button>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
