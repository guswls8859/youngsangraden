<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>용산어린이정원</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" rel="stylesheet">
    {% load static %}
    <link rel="stylesheet" href="{% static 'css/style.css' %}">
    <style>
        body {
            background-color: #f0f4f8;
            min-height: 100vh;
        }
        .hero {
            background: linear-gradient(135deg, #1a6b3c 0%, #2d9e5f 60%, #4bbf7e 100%);
            color: white;
            padding: 60px 0 48px;
            text-align: center;
        }
        .hero-title {
            font-size: 2rem;
            font-weight: 700;
            letter-spacing: -0.5px;
        }
        .hero-sub {
            font-size: 1rem;
            opacity: 0.85;
            margin-top: 6px;
        }
        .menu-card {
            border: none;
            border-radius: 1.25rem;
            box-shadow: 0 4px 20px rgba(0,0,0,0.08);
            transition: transform 0.18s ease, box-shadow 0.18s ease;
            cursor: pointer;
            text-decoration: none;
            color: inherit;
            display: block;
            background: white;
            padding: 36px 24px;
            text-align: center;
        }
        .menu-card:hover {
            transform: translateY(-6px);
            box-shadow: 0 10px 32px rgba(0,0,0,0.13);
            color: inherit;
        }
        .menu-icon {
            width: 72px;
            height: 72px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2rem;
            margin: 0 auto 18px;
        }
        .menu-title {
            font-size: 1.15rem;
            font-weight: 700;
            margin-bottom: 6px;
        }
        .menu-desc {
            font-size: 0.82rem;
            color: #6c757d;
            line-height: 1.5;
        }
        .badge-soon {
            font-size: 0.7rem;
            background: #e9ecef;
            color: #868e96;
            border-radius: 8px;
            padding: 2px 8px;
            margin-top: 8px;
            display: inline-block;
        }
        footer {
            text-align: center;
            padding: 24px;
            color: #adb5bd;
            font-size: 0.8rem;
        }
    </style>
</head>
<body>

<div class="hero">
    <div class="container">
        <div class="mb-3">
            <i class="bi bi-tree" style="font-size:2.8rem; opacity:0.9"></i>
        </div>
        <div class="hero-title">용산어린이정원</div>
        <div class="hero-sub">업무 관리 시스템</div>
    </div>
</div>

<div class="container py-5">
    <p class="text-center text-muted mb-4" style="font-size:0.95rem">관리할 영역을 선택하세요</p>

    <div class="row g-4 justify-content-center">

        <!-- 주차 관리 -->
        <div class="col-sm-6 col-lg-3">
            <div class="menu-card">
                <div class="menu-icon" style="background:#fff3e0; color:#f57c00">
                    <i class="bi bi-p-circle"></i>
                </div>
                <div class="menu-title">주차 관리</div>
                <div class="menu-desc">주차장 현황 및<br>입출차 관리</div>
                <div class="badge-soon">준비 중</div>
            </div>
        </div>

        <!-- 안내센터 -->
        <div class="col-sm-6 col-lg-3">
            <div class="menu-card">
                <div class="menu-icon" style="background:#e3f2fd; color:#1565c0">
                    <i class="bi bi-info-circle"></i>
                </div>
                <div class="menu-title">안내센터</div>
                <div class="menu-desc">방문객 안내 및<br>민원 관리</div>
                <div class="badge-soon">준비 중</div>
            </div>
        </div>

        <!-- 운영사무국 -->
        <div class="col-sm-6 col-lg-3">
            <a href="{% url 'accounts:login' %}" class="menu-card">
                <div class="menu-icon" style="background:#e8f5e9; color:#2e7d32">
                    <i class="bi bi-building"></i>
                </div>
                <div class="menu-title">운영사무국</div>
                <div class="menu-desc">일일 업무보고 및<br>인원 관리</div>
                <div style="margin-top:10px">
                    <span class="badge bg-success" style="font-size:0.72rem">
                        <i class="bi bi-arrow-right-circle"></i> 입장하기
                    </span>
                </div>
            </a>
        </div>

        <!-- 편의시설 -->
        <div class="col-sm-6 col-lg-3">
            <div class="menu-card">
                <div class="menu-icon" style="background:#fce4ec; color:#c62828">
                    <i class="bi bi-cup-straw"></i>
                </div>
                <div class="menu-title">편의시설</div>
                <div class="menu-desc">편의시설 현황 및<br>운영 관리</div>
                <div class="badge-soon">준비 중</div>
            </div>
        </div>

    </div>
</div>

<footer>
    &copy; 용산어린이정원 업무 관리 시스템
</footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
